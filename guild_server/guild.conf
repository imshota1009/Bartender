<VirtualHost *:80>
    ServerName guild.bartender-game.com
    ServerAdmin webmaster@bartender-game.com

    # Redirect HTTP to HTTPS (Optional but recommended)
    # RewriteEngine On
    # RewriteCond %{HTTPS} off
    # RewriteRule ^(.*)$ https://%{HTTP_HOST}%{REQUEST_URI} [L,R=301]

    ErrorLog ${APACHE_LOG_DIR}/guild-error.log
    CustomLog ${APACHE_LOG_DIR}/guild-access.log combined
</VirtualHost>

<VirtualHost *:443>
    ServerName guild.bartender-game.com
    
    # SSL Configuration (Example with Let's Encrypt paths)
    # SSLEngine on
    # SSLCertificateFile /etc/letsencrypt/live/guild.bartender-game.com/fullchain.pem
    # SSLCertificateKeyFile /etc/letsencrypt/live/guild.bartender-game.com/privkey.pem

    # Proxy Configuration to Node.js App
    ProxyPreserveHost On
    ProxyPass / http://localhost:3000/
    ProxyPassReverse / http://localhost:3000/

    <Directory /var/www/bartender-game/guild_server>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>
</VirtualHost>
